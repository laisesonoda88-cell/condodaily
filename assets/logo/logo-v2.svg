    <rect x="35" y="12" width="21" height="48" rx="3" fill="#145C53"/>
    <!-- Windows building 1 -->
    <rect x="14" y="30" width="4.5" height="4.5" rx="0.8" fill="white"/>
    <rect x="21" y="30" width="4.5" height="4.5" rx="0.8" fill="white"/>
    <rect x="14" y="39" width="4.5" height="4.5" rx="0.8" fill="white"/>
    <rect x="21" y="39" width="4.5" height="4.5" rx="0.8" fill="white"/>
    <!-- Windows building 2 -->
    <rect x="41" y="18" width="4.5" height="4.5" rx="0.8" fill="white"/>
    <rect x="48" y="18" width="4.5" height="4.5" rx="0.8" fill="white"/>
    <rect x="41" y="27" width="4.5" height="4.5" rx="0.8" fill="white"/>
    <rect x="48" y="27" width="4.5" height="4.5" rx="0.8" fill="white"/>
    <rect x="41" y="36" width="4.5" height="4.5" rx="0.8" fill="white"/>
    <rect x="48" y="36" width="4.5" height="4.5" rx="0.8" fill="white"/>
