<svg width="800" height="250" viewBox="0 0 800 250" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#ffffff"/>

  <defs>
    <style>
      .escudo-fundo { fill: #002B5C; } /* Azul Marinho Profundo */
      .linha-neon { fill: none; stroke: #4ADE80; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; } /* Verde Neon Fininho */
      .texto-condo { font-family: 'Arial', sans-serif; font-weight: 700; font-size: 90px; fill: #002B5C; }
      .texto-daily { font-family: 'Arial', sans-serif; font-weight: 400; font-size: 90px; fill: #002B5C; }
    </style>
  </defs>

  <g transform="translate(50, 25) scale(0.8)">
    <path class="escudo-fundo" d="M125,10 L225,10 C225,10 225,150 125,230 C25,150 25,10 25,10 Z" />
    
    <line x1="65" y1="180" x2="185" y2="180" class="linha-neon" />
    
    <path d="M100,180 L100,70 L150,70 L150,180" class="linha-neon" />
    <line x1="95" y1="70" x2="155" y2="70" class="linha-neon" />
    <line x1="100" y1="60" x2="150" y2="60" class="linha-neon" />
    
    <path d="M100,160 L70,160 L70,100 L100,85" class="linha-neon" />
    
    <path d="M150,160 L180,160 L180,100 L150,85" class="linha-neon" />
    
    <rect x="115" y="90" width="20" height="20" class="linha-neon" stroke-width="4" />
    <rect x="115" y="125" width="20" height="20" class="linha-neon" stroke-width="4" />
    <path d="M115,180 L115,160 L135,160 L135,180" class="linha-neon" />

    <rect x="78" y="110" width="12" height="12" class="linha-neon" stroke-width="3" />
    <rect x="78" y="135" width="12" height="12" class="linha-neon" stroke-width="3" />

    <rect x="160" y="110" width="12" height="12" class="linha-neon" stroke-width="3" />
    <rect x="160" y="135" width="12" height="12" class="linha-neon" stroke-width="3" />
  </g>

  <text x="250" y="150" class="texto-condo">Condo</text>
  <text x="530" y="150" class="texto-daily">Daily</text>
</svg>