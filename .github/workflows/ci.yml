name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

      - name: Server type check
        run: cd server && npx tsc --noEmit

      - name: Mobile type check
        run: cd apps/mobile && npx tsc --noEmit

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f server/Dockerfile -t condodaily-server:${{ github.sha }} .

      - name: Test container health
        run: |
          docker run -d --name test-server \
            -e DATABASE_URL=postgresql://fake:fake@localhost:5432/fake \
            -e JWT_SECRET=ci-test-jwt-secret-that-is-at-least-32-characters-long \
            -e ENCRYPTION_KEY=ci-test-encryption-key-that-is-at-least-32-chars \
            -p 3001:3001 \
            condodaily-server:${{ github.sha }} || true
          sleep 5
          docker logs test-server || true
          docker stop test-server || true
          docker rm test-server || true
