<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>CondoDaily — Painel de Leads</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --verde: #1B7A6E;
      --verde-light: #F0FAF8;
      --ouro: #F5A623;
      --ouro-light: #FFF8EB;
      --indigo: #2A3F6B;
      --dark: #1A2B3C;
      --bg: #F5F6F8;
      --card: white;
      --border: #E8EBF0;
      --text: #333;
      --text-muted: #888;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ─── Login Screen ─── */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      text-align: center;
    }
    .login-card h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 22px;
      margin: 16px 0 8px;
    }
    .login-card h1 span:first-child { color: var(--dark); }
    .login-card h1 span:last-child { color: var(--ouro); }
    .login-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
    .login-input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: var(--verde); }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--verde);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: opacity 0.2s;
    }
    .login-btn:hover { opacity: 0.9; }
    .login-error {
      color: #e74c3c;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }

    /* ─── Dashboard ─── */
    .dashboard { display: none; }
    .dash-header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .dash-logo {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 18px;
      font-weight: 800;
    }
    .dash-logo span:first-child { color: var(--dark); }
    .dash-logo span:last-child { color: var(--ouro); }
    .dash-logo small {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .dash-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .btn {
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn-verde { background: var(--verde); color: white; }
    .btn-verde:hover { opacity: 0.9; }
    .btn-ouro { background: var(--ouro); color: white; }
    .btn-ouro:hover { opacity: 0.9; }
    .btn-outline { background: white; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { background: var(--bg); }
    .btn-sm { padding: 8px 14px; font-size: 12px; }

    .dash-body { padding: 24px; max-width: 1200px; margin: 0 auto; }

    /* ─── Stats Cards ─── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid var(--border);
    }
    .stat-card .label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .stat-card .value {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 28px;
      font-weight: 800;
    }
    .stat-card .value.verde { color: var(--verde); }
    .stat-card .value.ouro { color: var(--ouro); }
    .stat-card .value.indigo { color: var(--indigo); }

    /* ─── Filters ─── */
    .filters {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px 20px;
      border: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .filter-input, .filter-select {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: white;
    }
    .filter-input { flex: 1; min-width: 200px; }
    .filter-input:focus, .filter-select:focus { border-color: var(--verde); }

    /* ─── Table ─── */
    .table-wrap {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    thead th {
      background: var(--bg);
      padding: 12px 16px;
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody td {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #FAFBFC; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .badge-sindico { background: var(--verde-light); color: var(--verde); }
    .badge-profissional { background: var(--ouro-light); color: #C4841A; }
    .badge-morador { background: #EDF0F7; color: var(--indigo); }
    .badge-outro { background: #F0F0F0; color: #666; }
    .badge-source { background: #F0F0F0; color: #555; font-size: 10px; }

    .email-status { font-size: 16px; }

    /* ─── Pagination ─── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--card);
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-muted);
    }
    .pagination .pages {
      display: flex;
      gap: 6px;
    }
    .page-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }
    .page-btn:hover { background: var(--bg); }
    .page-btn.active { background: var(--verde); color: white; border-color: var(--verde); }

    /* ─── Loading ─── */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--verde);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state svg { opacity: 0.3; margin-bottom: 12px; }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .dash-body { padding: 16px; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .filters { flex-direction: column; }
      .filter-input { min-width: auto; width: 100%; }
      .table-wrap { overflow-x: auto; }
      table { min-width: 700px; }
      .dash-header { flex-direction: column; gap: 12px; }
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <svg width="48" height="48" viewBox="0 0 64 64" fill="none">
        <rect x="6" y="16" width="24" height="40" rx="3" fill="#1B7A6E"/>
        <rect x="34" y="4" width="24" height="52" rx="3" fill="#145C53"/>
        <circle cx="18" cy="52" r="4" fill="#F5A623"/>
        <circle cx="46" cy="52" r="4" fill="#F5A623"/>
      </svg>
      <h1><span>Condo</span><span>Daily</span></h1>
      <p>Painel administrativo de leads</p>
      <input type="password" id="admin-key" class="login-input" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="login-btn" onclick="doLogin()">Entrar</button>
      <p class="login-error" id="login-error">Senha incorreta. Tente novamente.</p>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard">
    <header class="dash-header">
      <div class="dash-logo">
        <span>Condo</span><span>Daily</span>
        <small>PAINEL DE LEADS</small>
      </div>
      <div class="dash-actions">
        <button class="btn btn-verde" onclick="exportCSV()">Exportar CSV</button>
        <button class="btn btn-outline" onclick="loadData()">Atualizar</button>
        <button class="btn btn-outline btn-sm" onclick="logout()">Sair</button>
      </div>
    </header>

    <div class="dash-body">
      <!-- Stats -->
      <div class="stats" id="stats">
        <div class="stat-card"><div class="label">Total de Leads</div><div class="value verde" id="stat-total">-</div></div>
        <div class="stat-card"><div class="label">Hoje</div><div class="value ouro" id="stat-today">-</div></div>
        <div class="stat-card"><div class="label">Esta Semana</div><div class="value indigo" id="stat-week">-</div></div>
        <div class="stat-card"><div class="label">Indicacoes</div><div class="value verde" id="stat-referrals">-</div></div>
        <div class="stat-card"><div class="label">Sindicos</div><div class="value verde" id="stat-sindicos">-</div></div>
        <div class="stat-card"><div class="label">Profissionais</div><div class="value ouro" id="stat-profissionais">-</div></div>
      </div>

      <!-- Filters -->
      <div class="filters">
        <input type="text" class="filter-input" id="filter-search" placeholder="Buscar por nome ou email..." oninput="debounceLoad()">
        <select class="filter-select" id="filter-type" onchange="loadLeads()">
          <option value="">Todos os tipos</option>
          <option value="SINDICO">Sindico</option>
          <option value="PROFISSIONAL">Profissional</option>
          <option value="MORADOR">Morador</option>
          <option value="OUTRO">Outro</option>
        </select>
        <select class="filter-select" id="filter-source" onchange="loadLeads()">
          <option value="">Todas as origens</option>
          <option value="LANDING_PAGE">Landing Page</option>
          <option value="REFERRAL">Indicacao</option>
          <option value="QUIZ">Quiz</option>
          <option value="CTA_CONDOMINIO">CTA Condominio</option>
          <option value="CTA_PROFISSIONAL">CTA Profissional</option>
        </select>
      </div>

      <!-- Table -->
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nome</th>
              <th>Email</th>
              <th>Tipo</th>
              <th>Origem</th>
              <th>Indicou</th>
              <th>Quiz</th>
              <th>Email</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody id="leads-table">
            <tr><td colspan="9" class="loading"><div class="spinner"></div>Carregando...</td></tr>
          </tbody>
        </table>
        <div class="pagination" id="pagination" style="display:none">
          <span id="pagination-info"></span>
          <div class="pages" id="pagination-pages"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ─── Config ───────────────────────────────────
    var API_BASE = window.location.hostname === 'localhost'
      ? 'http://localhost:3001/api/leads'
      : 'https://api.condodaily.com.br/api/leads';

    var adminKey = '';
    var currentPage = 1;
    var debounceTimer = null;

    // ─── Login ────────────────────────────────────
    function doLogin() {
      adminKey = document.getElementById('admin-key').value.trim();
      if (!adminKey) return;

      // Test the key by fetching stats
      fetch(API_BASE + '/stats', {
        headers: { 'x-admin-key': adminKey },
      })
      .then(function(res) {
        if (res.status === 401) {
          document.getElementById('login-error').style.display = 'block';
          return null;
        }
        return res.json();
      })
      .then(function(data) {
        if (data && data.success) {
          sessionStorage.setItem('cd_admin_key', adminKey);
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('dashboard').style.display = 'block';
          loadData();
        }
      })
      .catch(function(err) {
        console.error(err);
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('login-error').textContent = 'Erro de conexao. Verifique se o servidor esta rodando.';
      });
    }

    function logout() {
      sessionStorage.removeItem('cd_admin_key');
      adminKey = '';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('dashboard').style.display = 'none';
    }

    // Auto-login from session
    (function() {
      var saved = sessionStorage.getItem('cd_admin_key');
      if (saved) {
        adminKey = saved;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadData();
      }
    })();

    // ─── Load All Data ────────────────────────────
    function loadData() {
      loadStats();
      loadLeads();
    }

    // ─── Stats ────────────────────────────────────
    function loadStats() {
      fetch(API_BASE + '/stats', {
        headers: { 'x-admin-key': adminKey },
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.success) return;
        var s = data.stats;
        document.getElementById('stat-total').textContent = s.total;
        document.getElementById('stat-today').textContent = s.today;
        document.getElementById('stat-week').textContent = s.thisWeek;
        document.getElementById('stat-referrals').textContent = s.referrals;

        var sindicos = 0, profissionais = 0;
        s.byType.forEach(function(t) {
          if (t.type === 'SINDICO') sindicos = t.count;
          if (t.type === 'PROFISSIONAL') profissionais = t.count;
        });
        document.getElementById('stat-sindicos').textContent = sindicos;
        document.getElementById('stat-profissionais').textContent = profissionais;
      });
    }

    // ─── Leads Table ──────────────────────────────
    function loadLeads() {
      var search = document.getElementById('filter-search').value.trim();
      var type = document.getElementById('filter-type').value;
      var source = document.getElementById('filter-source').value;

      var params = new URLSearchParams();
      params.set('page', currentPage);
      params.set('limit', '30');
      if (search) params.set('search', search);
      if (type) params.set('type', type);
      if (source) params.set('source', source);

      var tbody = document.getElementById('leads-table');
      tbody.innerHTML = '<tr><td colspan="9" class="loading"><div class="spinner"></div>Carregando...</td></tr>';

      fetch(API_BASE + '?' + params.toString(), {
        headers: { 'x-admin-key': adminKey },
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.success) return;

        var leads = data.data;
        var pg = data.pagination;

        if (leads.length === 0) {
          tbody.innerHTML = '<tr><td colspan="9" class="empty-state">' +
            '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M8 15s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>' +
            '<p>Nenhum lead encontrado</p></td></tr>';
          document.getElementById('pagination').style.display = 'none';
          return;
        }

        var html = '';
        leads.forEach(function(l, i) {
          var typeClass = 'badge-' + l.type.toLowerCase();
          var date = new Date(l.created_at);
          var dateStr = date.toLocaleDateString('pt-BR') + ' ' + date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

          html += '<tr>' +
            '<td style="color:#999">' + l.id + '</td>' +
            '<td><strong>' + escapeHtml(l.name) + '</strong></td>' +
            '<td>' + escapeHtml(l.email) + '</td>' +
            '<td><span class="badge ' + typeClass + '">' + formatType(l.type) + '</span></td>' +
            '<td><span class="badge badge-source">' + formatSource(l.source) + '</span></td>' +
            '<td>' + (l.referral_name || l.referral_email || '<span style="color:#ccc">—</span>') + '</td>' +
            '<td style="text-align:center">' + (l.quiz_score != null ? l.quiz_score + '/6' : '<span style="color:#ccc">—</span>') + '</td>' +
            '<td class="email-status" style="text-align:center">' + (l.email_sent ? '&#9989;' : '&#10060;') + '</td>' +
            '<td style="white-space:nowrap;color:#888;font-size:12px">' + dateStr + '</td>' +
            '</tr>';
        });
        tbody.innerHTML = html;

        // Pagination
        document.getElementById('pagination').style.display = 'flex';
        document.getElementById('pagination-info').textContent =
          'Mostrando ' + ((pg.page - 1) * pg.limit + 1) + '-' + Math.min(pg.page * pg.limit, pg.total) + ' de ' + pg.total;

        var pagesHtml = '';
        for (var p = 1; p <= pg.pages; p++) {
          pagesHtml += '<button class="page-btn' + (p === pg.page ? ' active' : '') + '" onclick="goToPage(' + p + ')">' + p + '</button>';
        }
        document.getElementById('pagination-pages').innerHTML = pagesHtml;
      });
    }

    function goToPage(p) {
      currentPage = p;
      loadLeads();
    }

    function debounceLoad() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(function() {
        currentPage = 1;
        loadLeads();
      }, 400);
    }

    // ─── Export CSV ───────────────────────────────
    function exportCSV() {
      var url = API_BASE + '/export';
      // Open in new tab with auth header via fetch + blob
      fetch(url, {
        headers: { 'x-admin-key': adminKey },
      })
      .then(function(r) { return r.blob(); })
      .then(function(blob) {
        var link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = 'leads-condodaily-' + new Date().toISOString().slice(0, 10) + '.csv';
        link.click();
        URL.revokeObjectURL(link.href);
      });
    }

    // ─── Helpers ──────────────────────────────────
    function escapeHtml(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function formatType(t) {
      var map = { SINDICO: 'Sindico', PROFISSIONAL: 'Profissional', MORADOR: 'Morador', OUTRO: 'Outro' };
      return map[t] || t;
    }

    function formatSource(s) {
      var map = {
        LANDING_PAGE: 'Landing',
        REFERRAL: 'Indicacao',
        QUIZ: 'Quiz',
        CTA_CONDOMINIO: 'CTA Condo',
        CTA_PROFISSIONAL: 'CTA Prof',
      };
      return map[s] || s;
    }
  </script>
</body>
</html>
