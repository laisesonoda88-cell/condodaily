<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CondoDaily — Serviços para Condomínios</title>
  <meta name="description" content="CondoDaily conecta condomínios a profissionais de manutenção qualificados. Limpeza, jardinagem, manutenção elétrica e mais.">
  <meta name="theme-color" content="#1B7A6E">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏢</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1B7A6E 0%, #0d4f46 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 480px;
    }
    .logo { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .tagline { font-size: 1.1rem; opacity: 0.85; margin-bottom: 2rem; }
    .badges { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.15);
      padding: 0.75rem 1.5rem;
      border-radius: 12px;
      text-decoration: none;
      color: #fff;
      font-weight: 600;
      transition: background 0.2s;
    }
    .badge:hover { background: rgba(255,255,255,0.25); }
    .badge img { height: 24px; }
    .footer {
      margin-top: 3rem;
      font-size: 0.85rem;
      opacity: 0.6;
    }
    .footer a { color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🏢</div>
    <h1>CondoDaily</h1>
    <p class="tagline">Conectando condomínios a profissionais de manutenção qualificados.</p>
    <div class="badges">
      <a class="badge" href="https://apps.apple.com/app/condodaily/idXXXXXXXXXX" id="ios-badge">
        🍎 App Store
      </a>
      <a class="badge" href="https://play.google.com/store/apps/details?id=br.com.condodaily.app" id="android-badge">
        ▶️ Google Play
      </a>
    </div>
    <div class="footer">
      <p>&copy; 2026 CondoDaily. Todos os direitos reservados.</p>
      <p><a href="/privacy">Privacidade</a> · <a href="/terms">Termos de Uso</a></p>
    </div>
  </div>
</body>
</html>
